server.port=8080

# Kommo OAuth
kommo.client-id=${KOMMO_CLIENT_ID}
kommo.client-secret=${KOMMO_CLIENT_SECRET}
kommo.redirect-uri=${BACKEND_URL:http://localhost:8080}/auth/kommo/callback

# JSON File Storage
storage.data-dir=${DATA_DIR:./data}

# Frontend URL for CORS and redirects
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Jackson - use ISO-8601 for dates
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
